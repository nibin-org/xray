<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xray Panel</title>
  <link rel="stylesheet" href="devtools-panel.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">XRAY DEVTOOLS</div>
        <h1>Xray Inspector</h1>
      </div>
      <div class="actions">
        <button id="open-sidebar" class="action-btn">Open Sidebar</button>
        <button id="refresh-selection" class="action-btn primary">Refresh Selection</button>
        <button id="load-overlay" class="action-btn">Use Last Overlay Capture</button>
        <button id="close-panel" class="action-btn action-btn-ghost">Close DevTools</button>
      </div>
    </header>

    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">Source</span>
        <span id="source-badge" class="summary-value">Waiting</span>
      </div>
      <div class="summary-card wide">
        <span class="summary-label">Page</span>
        <span id="page-meta" class="summary-value muted">Open Elements and select a node, or inspect from the overlay first.</span>
      </div>
      <div class="summary-card wide">
        <span class="summary-label">Status</span>
        <span id="status-text" class="summary-value muted">No capture loaded yet.</span>
      </div>
    </section>

    <main id="panel-root" class="panel-root">
      <div class="empty-state empty-state-ready">
        <div class="empty-eyebrow">Ready</div>
        <div class="empty-icon-wrap">
          <div class="empty-icon">⬡</div>
        </div>
        <div class="empty-title">Xray is ready in DevTools</div>
        <div class="empty-text">Select an element in the Elements panel or use the in-page Xray overlay and click DevTools.</div>
      </div>
    </main>
  </div>

  <script src="devtools-panel.js"></script>
</body>
</html>
